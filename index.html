<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bar – Núcleo Sporting Viseu</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --verde: #1a7c3e;
      --verde-escuro: #0f4f27;
      --verde-claro: #e8f5ee;
      --amarelo: #f5c800;
      --branco: #ffffff;
      --cinza-claro: #f4f4f2;
      --cinza: #e0e0db;
      --texto: #1a1a18;
      --texto-suave: #5c5c58;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--cinza-claro);
      color: var(--texto);
      min-height: 100vh;
    }

    header {
      background: var(--verde-escuro);
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo-wrap {
      width: 46px; height: 46px;
      background: var(--amarelo);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 18px;
      color: var(--verde-escuro);
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--branco);
      letter-spacing: 0.3px;
      line-height: 1;
    }
    .header-text p {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }

    .main { padding: 20px 16px 100px; max-width: 480px; margin: 0 auto; }

    /* Mesa selector */
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--texto-suave);
      margin-bottom: 10px;
    }
    .mesa-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 28px;
    }
    .mesa-btn {
      aspect-ratio: 1;
      border: 2px solid var(--cinza);
      border-radius: 10px;
      background: var(--branco);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 700;
      color: var(--texto);
      cursor: pointer;
      transition: all 0.15s;
    }
    .mesa-btn:active { transform: scale(0.95); }
    .mesa-btn.active {
      background: var(--verde);
      border-color: var(--verde);
      color: var(--branco);
      box-shadow: 0 3px 10px rgba(26,124,62,0.35);
    }

    /* Menu items */
    .menu-list { margin-bottom: 20px; }
    .menu-item {
      background: var(--branco);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .menu-item.has-qty { border-color: var(--verde); }
    .item-emoji { font-size: 32px; line-height: 1; flex-shrink: 0; }
    .item-info { flex: 1; }
    .item-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 19px; font-weight: 700;
      color: var(--texto);
      line-height: 1.1;
    }
    .item-price {
      font-size: 13px;
      color: var(--texto-suave);
      margin-top: 2px;
    }
    .qty-control {
      display: flex; align-items: center; gap: 12px;
    }
    .qty-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--cinza-claro);
      color: var(--texto);
      font-size: 20px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
      font-weight: 400;
    }
    .qty-btn:active { transform: scale(0.9); }
    .qty-btn.plus { background: var(--verde); color: white; }
    .qty-btn.plus:hover { background: var(--verde-escuro); }
    .qty-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px; font-weight: 700;
      min-width: 24px; text-align: center;
      color: var(--verde);
    }

    /* Total bar */
    .total-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--branco);
      border-top: 1px solid var(--cinza);
      padding: 14px 20px;
      max-width: 480px;
      margin: 0 auto;
    }
    .total-info {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .total-label { font-size: 13px; color: var(--texto-suave); }
    .total-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px; font-weight: 800;
      color: var(--verde);
    }
    .pedir-btn {
      width: 100%;
      padding: 15px;
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pedir-btn:hover { background: var(--verde-escuro); }
    .pedir-btn:active { transform: scale(0.98); }
    .pedir-btn:disabled {
      background: var(--cinza);
      color: var(--texto-suave);
      cursor: default;
    }

    /* Sucesso */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .overlay.show { display: flex; }
    .success-card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 320px; width: 90%;
      animation: popIn 0.25s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .success-icon { font-size: 56px; margin-bottom: 16px; }
    .success-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 800;
      color: var(--verde);
      margin-bottom: 8px;
    }
    .success-sub { font-size: 15px; color: var(--texto-suave); line-height: 1.5; }
    .success-btn {
      margin-top: 24px;
      padding: 12px 28px;
      background: var(--verde);
      color: white;
      border: none; border-radius: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 700;
      cursor: pointer;
    }

    /* Mesa não selecionada aviso */
    .aviso {
      background: #fff8e1;
      border: 1px solid #f5c800;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #7a5f00;
      margin-bottom: 20px;
      display: none;
    }
    .aviso.show { display: block; }
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">SCP</div>
  <div class="header-text">
    <h1>Bar do Núcleo</h1>
    <p>Sporting Clube de Portugal – Viseu</p>
  </div>
</header>

<div class="main">
  <div class="section-title">Qual é a tua mesa?</div>
  <div class="mesa-grid" id="mesa-grid">
    <!-- geradas pelo JS -->
  </div>

  <div class="aviso" id="aviso">⚠️ Escolhe a tua mesa antes de pedir.</div>

  <div class="section-title">O que queres?</div>
  <div class="menu-list" id="menu-list">
    <!-- geradas pelo JS -->
  </div>
</div>

<div class="total-bar">
  <div class="total-info">
    <span class="total-label">Total do pedido</span>
    <span class="total-value" id="total-valor">0,00 €</span>
  </div>
  <button class="pedir-btn" id="pedir-btn" onclick="enviarPedido()">Fazer pedido</button>
</div>

<div class="overlay" id="overlay">
  <div class="success-card">
    <div class="success-icon">⚽</div>
    <div class="success-title">Pedido enviado!</div>
    <div class="success-sub">A tua encomenda está a ser preparada.<br>Trazemos à mesa <strong id="mesa-confirmada"></strong>!</div>
    <button class="success-btn" onclick="novosPedido()">Fazer novo pedido</button>
  </div>
</div>

<script>
  // ─── CONFIGURAÇÃO ────────────────────────────────────────────
  // Cola aqui o URL do teu Google Apps Script depois de publicar
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEl6-gPFy2kOrCeFC5jVLv5iAsTI1AcJSeGQ0rnCESVYgK1xd4zwU3NqT3G7nDuB84/exec";

  const PRODUTOS = [
    { id: "mini",    nome: "Mini",        preco: 1.00, emoji: "🍺" },
    { id: "cerveja", nome: "Cerveja 0,33", preco: 1.20, emoji: "🍻" },
    { id: "bifana",  nome: "Bifana",       preco: 2.50, emoji: "🥪" },
    { id: "agua",    nome: "Água",         preco: 1.00, emoji: "💧" },
  ];
  const NUM_MESAS = 10;
  // ─────────────────────────────────────────────────────────────

  let mesaSelecionada = null;
  let quantidades = {};
  PRODUTOS.forEach(p => quantidades[p.id] = 0);

  // Gerar mesas
  const mesaGrid = document.getElementById('mesa-grid');
  for (let i = 1; i <= NUM_MESAS; i++) {
    const btn = document.createElement('button');
    btn.className = 'mesa-btn';
    btn.textContent = i;
    btn.onclick = () => selecionarMesa(i, btn);
    mesaGrid.appendChild(btn);
  }

  // Gerar menu
  const menuList = document.getElementById('menu-list');
  PRODUTOS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'menu-item';
    div.id = 'item-' + p.id;
    div.innerHTML = `
      <div class="item-emoji">${p.emoji}</div>
      <div class="item-info">
        <div class="item-name">${p.nome}</div>
        <div class="item-price">${p.preco.toFixed(2).replace('.', ',')} €</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn minus" onclick="mudarQty('${p.id}', -1)">−</button>
        <span class="qty-num" id="qty-${p.id}">0</span>
        <button class="qty-btn plus" onclick="mudarQty('${p.id}', 1)">+</button>
      </div>`;
    menuList.appendChild(div);
  });

  function selecionarMesa(n, btn) {
    mesaSelecionada = n;
    document.querySelectorAll('.mesa-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('aviso').classList.remove('show');
  }

  function mudarQty(id, delta) {
    quantidades[id] = Math.max(0, quantidades[id] + delta);
    document.getElementById('qty-' + id).textContent = quantidades[id];
    const item = document.getElementById('item-' + id);
    item.classList.toggle('has-qty', quantidades[id] > 0);
    atualizarTotal();
  }

  function atualizarTotal() {
    let total = 0;
    PRODUTOS.forEach(p => total += quantidades[p.id] * p.preco);
    document.getElementById('total-valor').textContent = total.toFixed(2).replace('.', ',') + ' €';
    document.getElementById('pedir-btn').disabled = total === 0;
  }

  atualizarTotal();

  function enviarPedido() {
    if (!mesaSelecionada) {
      document.getElementById('aviso').classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }
    const linhas = PRODUTOS.filter(p => quantidades[p.id] > 0)
      .map(p => `${quantidades[p.id]}x ${p.nome}`);
    if (linhas.length === 0) return;

    const btn = document.getElementById('pedir-btn');
    btn.disabled = true;
    btn.textContent = 'A enviar...';

    const payload = {
      mesa: mesaSelecionada,
      itens: linhas.join(', '),
      total: PRODUTOS.reduce((s, p) => s + quantidades[p.id] * p.preco, 0).toFixed(2),
      hora: new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' })
    };

    // Enviar para Google Apps Script
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    })
    .then(() => mostrarSucesso())
    .catch(() => mostrarSucesso());
  }

  function mostrarSucesso() {
    document.getElementById('mesa-confirmada').textContent = mesaSelecionada;
    document.getElementById('overlay').classList.add('show');
  }

  function novosPedido() {
    PRODUTOS.forEach(p => {
      quantidades[p.id] = 0;
      document.getElementById('qty-' + p.id).textContent = 0;
      document.getElementById('item-' + p.id).classList.remove('has-qty');
    });
    atualizarTotal();
    document.getElementById('pedir-btn').textContent = 'Fazer pedido';
    document.getElementById('overlay').classList.remove('show');
  }
</script>
</body>
</html>
